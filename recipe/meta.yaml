{% set name = "mapkit" %}
{% set version = "1.2.6" %}
{% set sha256 = "10cbca94230dcf940c27047f161c5628b19533c338ed610f07a064ec68358541" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - requests
    - sqlalchemy
    - setuptools
  run:
    - python >={{ python_min }}
    - requests
    - sqlalchemy

test:
  requires:
    - python {{ python_min }}
  imports:
    - mapkit
    - mapkit.RasterConverter
    - mapkit.GeometryConverter
    - mapkit.RasterLoader
    - mapkit.sqlatypes

about:
  home: https://github.com/CI-WATER/mapkit
  license: BSD-2-Clause
  license_family: BSD
  summary: 'A Python module with mapping functions for PostGIS enabled PostgreSQL databases.'
  description: |
    MapKit is a Python module with mapping functions for PostGIS enabled
    PostgreSQL databases.
  dev_url: https://github.com/CI-WATER/mapkit

extra:
  recipe-maintainers:
    - swainn
    - snowman2
